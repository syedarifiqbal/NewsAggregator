services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: news-aggregator-app
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - .:/var/www/html
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - news-aggregator

  nginx:
    image: nginx:alpine
    container_name: news-aggregator-nginx
    restart: unless-stopped
    ports:
      - "8088:80"
    volumes:
      - .:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - news-aggregator

  db:
    image: postgres:16-alpine
    container_name: news-aggregator-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_DATABASE:-news_aggregator}
      POSTGRES_USER: ${DB_USERNAME:-news_aggregator}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-secret}
    ports:
      - "5442:5432"
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-news_aggregator}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - news-aggregator

  redis:
    image: redis:7-alpine
    container_name: news-aggregator-redis
    restart: unless-stopped
    ports:
      - "6389:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - news-aggregator

volumes:
  db-data:
  redis-data:

networks:
  news-aggregator:
    driver: bridge
